apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: benchmark-app
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 1
      containers:
        - image: europe-west1-docker.pkg.dev/YOUR_PROJECT/benchmark/benchmark-app:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
