type: Microsoft.App/containerApps
name: benchmark-app
location: westeurope
properties:
  managedEnvironmentId: /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/rg-benchmark/providers/Microsoft.App/managedEnvironments/aca-benchmark
  configuration:
    ingress:
      external: true
      targetPort: 8080
    activeRevisionsMode: Single
  template:
    scale:
      minReplicas: 0
      maxReplicas: 1
    containers:
      - name: benchmark-app
        image: ghcr.io/example/cold-start-perf-comparison:latest
        resources:
          cpu: 1.0
          memory: 2Gi
