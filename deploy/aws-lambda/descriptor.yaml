providerId: aws-lambda
displayName: AWS Lambda
region: eu-west-1
runtimeVersion: 8.0.14
startupPath: /api/startup
computePath: /api/compute/matrix
idleWindowMinutes: 15
supportsDeterministicScaleToZeroConfirmation: false
scaleToZeroEvidenceStrategy: Inference-only after uniform idle window
disabledWarmStartOptimizations:
  - provisioned-concurrency
resourceSettings:
  memorySizeMb: 1024
  architecture: x86_64
parityNotes:
  - Deterministic zero-state confirmation is unavailable in v1; cold intent is annotated with a parity exception.
